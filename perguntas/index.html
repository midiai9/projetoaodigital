<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Diagnóstico · Índice Always On de Vazamento de Valor</title>
<meta name="robots" content="noindex" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --blue:#3E6BD6; --indigo:#5C5ABE; --violet:#7B46AA; --magenta:#9A3E9C;
    --grad:linear-gradient(135deg,#3E6BD6 0%,#5C5ABE 38%,#7B46AA 70%,#9A3E9C 100%);
    --ink:#15172A; --muted:#5B6173; --paper:#F7F9FC; --card:#FFFFFF; --hair:#E6E9F3;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:'Poppins',system-ui,sans-serif;color:var(--ink);background:var(--paper);
    -webkit-font-smoothing:antialiased;overflow:hidden}
  #app{height:100dvh;display:flex;flex-direction:column}
  .progress{height:4px;background:var(--hair);flex:0 0 auto}
  .progress > i{display:block;height:100%;width:0;background:var(--grad);transition:width .5s cubic-bezier(.16,1,.3,1)}
  header{display:flex;align-items:center;justify-content:space-between;padding:18px 24px;flex:0 0 auto}
  header img{height:30px}
  header .step{font-size:12px;color:var(--muted);font-weight:500;letter-spacing:.04em}
  main{flex:1 1 auto;display:flex;align-items:center;justify-content:center;padding:16px 24px 28px;overflow-y:auto}
  .screen{width:100%;max-width:720px;animation:in .5s cubic-bezier(.16,1,.3,1)}
  @keyframes in{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
  .kicker{font-size:13px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;
    background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent;margin-bottom:14px}
  h1{font-size:clamp(26px,4.4vw,40px);font-weight:700;line-height:1.08;letter-spacing:-.02em}
  h2{font-size:clamp(22px,3.6vw,32px);font-weight:600;line-height:1.12;letter-spacing:-.015em}
  .sub{color:var(--muted);font-size:16px;line-height:1.5;margin-top:14px;max-width:60ch}
  .num{font-weight:700;font-size:14px;color:var(--blue);letter-spacing:.06em;margin-bottom:6px}
  .field{margin-top:18px}
  .field label{display:block;font-size:13px;font-weight:500;color:var(--muted);margin-bottom:6px}
  input,textarea{width:100%;font-family:inherit;font-size:17px;color:var(--ink);background:var(--card);
    border:1.5px solid var(--hair);border-radius:14px;padding:14px 16px;outline:none;transition:border-color .2s,box-shadow .2s}
  textarea{min-height:128px;resize:vertical;line-height:1.5;padding-right:64px}
  input:focus,textarea:focus{border-color:var(--blue);box-shadow:0 0 0 4px rgba(62,107,214,.12)}
  .ta-wrap{position:relative}
  .ai{display:flex;gap:12px;margin-top:18px;padding:14px 16px;background:#F2F5FD;border:1px solid #E2E9F9;border-radius:16px;align-items:flex-start}
  .ai .dot{flex:0 0 auto;width:26px;height:26px;border-radius:50%;background:var(--grad);display:flex;align-items:center;justify-content:center}
  .ai .dot::after{content:"";width:9px;height:9px;border-radius:50%;background:#fff}
  .ai p{font-size:15px;line-height:1.45;color:var(--ink)}
  .confirm-val{margin-top:10px;font-size:14.5px;color:var(--muted)}
  .confirm-val strong{color:var(--ink)}
  .row{display:flex;gap:12px;align-items:center;margin-top:18px;flex-wrap:wrap}
  button{font-family:inherit;cursor:pointer;border:none;border-radius:999px;font-weight:600;font-size:16px;
    transition:transform .12s ease,box-shadow .2s,opacity .2s}
  button:active{transform:scale(.97)}
  .btn-primary{background:var(--grad);color:#fff;padding:14px 28px;box-shadow:0 10px 24px -10px rgba(122,70,170,.6)}
  .btn-primary:disabled{opacity:.5;cursor:not-allowed;box-shadow:none}
  .mic{position:absolute;right:10px;bottom:10px;width:44px;height:44px;border-radius:50%;background:#fff;
    border:1.5px solid var(--hair);display:flex;align-items:center;justify-content:center;color:var(--violet)}
  .mic svg{width:21px;height:21px}
  .mic.rec{background:var(--magenta);border-color:var(--magenta);color:#fff;animation:pulse 1.2s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(154,62,156,.45)}70%{box-shadow:0 0 0 12px rgba(154,62,156,0)}100%{box-shadow:0 0 0 0 rgba(154,62,156,0)}}
  .hint{font-size:13px;color:var(--muted)}
  .err{color:#C0392B;font-size:13px;margin-top:8px;min-height:18px}
  .spinner{width:18px;height:18px;border:2.5px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;
    display:inline-block;animation:spin .7s linear infinite;vertical-align:-3px;margin-right:8px}
  @keyframes spin{to{transform:rotate(360deg)}}
  .done-badge{width:72px;height:72px;border-radius:50%;background:var(--grad);display:flex;align-items:center;justify-content:center;margin-bottom:22px}
  .done-badge svg{width:34px;height:34px;color:#fff}
  ul.recap{list-style:none;margin-top:22px;border-top:1px solid var(--hair)}
  ul.recap li{display:flex;justify-content:space-between;gap:16px;padding:11px 0;border-bottom:1px solid var(--hair);font-size:14px}
  ul.recap li span:first-child{color:var(--muted)}
  ul.recap li span:last-child{font-weight:500;text-align:right}
  @media(max-width:520px){ main{align-items:flex-start;padding-top:8px} header img{height:26px} }
</style>
</head>
<body>
<div id="app">
  <div class="progress"><i id="bar"></i></div>
  <header>
    <img src="/brand/alwayson-black.png" alt="Always On" onerror="this.style.display='none'"/>
    <span class="step" id="stepLabel"></span>
  </header>
  <main><div id="stage"></div></main>
</div>

<script>
const WEBHOOK = "https://n8n.i9criacoes.com.br/webhook/indice-questionario";

const QUESTIONS = [
  { id:"1", title:"Qual é o seu maior desafio?",
    prompt:"Nos próximos 90 dias, qual único problema em Marketing, Vendas, CRM ou Experiência do Cliente, se resolvido, traria o maior retorno financeiro para a sua empresa?",
    placeholder:"Escreva, ou toque no microfone para responder por áudio…" },
  { id:"2", title:"Onde este desafio te afeta mais?",
    prompt:"Conte com suas palavras — eu identifico se é Receita, Margem, Produtividade, Experiência do Cliente, Crescimento, Risco/Compliance ou Outro.",
    placeholder:"Ex.: está derrubando minha margem porque…" },
  { id:"3", title:"Qual abordagem resolveria isso?",
    prompt:"Na sua visão, o que teria maior potencial para resolver esse desafio? (vendas, uso de dados, automação, IA, CRM, conteúdo, treinamento…)",
    placeholder:"Ex.: acho que falta automação e melhor uso de dados…" },
  { id:"4", title:"Qual o tamanho do impacto?",
    prompt:"Qual a ordem de grandeza do impacto anual desse desafio? Um número aproximado já ajuda.",
    placeholder:"Ex.: deve custar uns 3 milhões por ano…" },
  { id:"5", title:"Qual o setor da sua organização?",
    prompt:"Qual setor melhor representa a empresa em que você atua?",
    placeholder:"Ex.: somos do varejo de moda…" },
  { id:"6", title:"Qual a faixa de faturamento?",
    prompt:"Qual a faixa de faturamento anual da empresa?",
    placeholder:"Ex.: faturamos cerca de 120 milhões…" },
  { id:"7", title:"Qual o seu papel na organização?",
    prompt:"Para fechar: qual o seu papel na empresa?",
    placeholder:"Ex.: sou diretor comercial…" }
];

const state = { contact:{}, answers:{}, utm:{} };
(function(){ const p=new URLSearchParams(location.search);
  ["utm_source","utm_medium","utm_campaign","utm_content","utm_term"].forEach(k=>{ if(p.get(k)) state.utm[k]=p.get(k); }); })();

const stage = document.getElementById("stage");
const bar = document.getElementById("bar");
const stepLabel = document.getElementById("stepLabel");
const TOTAL = QUESTIONS.length + 2;
let stepIndex = 0;
function setProgress(n){ bar.style.width = Math.round((n/TOTAL)*100)+"%"; }

function screenIntro(){
  stepLabel.textContent = "";
  setProgress(0.4);
  stage.innerHTML = `
    <div class="screen">
      <div class="kicker">Diagnóstico Executivo · menos de 5 min</div>
      <h1>Onde a sua empresa está<br/>deixando valor escapar?</h1>
      <p class="sub">São 7 perguntas. Responda <b>escrevendo ou gravando um áudio</b> — uma inteligência conduz a conversa e devolve o seu raio-X. Tudo confidencial.</p>
      <div class="row">
        <button class="btn-primary" id="go">Iniciar diagnóstico</button>
        <span class="hint">Leva ~5 minutos</span>
      </div>
    </div>`;
  document.getElementById("go").onclick = ()=>{ stepIndex=1; screenContact(); };
}

function screenContact(){
  stepLabel.textContent = "Seus dados";
  setProgress(1);
  stage.innerHTML = `
    <div class="screen">
      <div class="num">ANTES DE COMEÇAR</div>
      <h2>Para quem preparamos o diagnóstico?</h2>
      <div class="field"><label>Nome completo</label><input id="nome" autocomplete="name" placeholder="Seu nome"/></div>
      <div class="field"><label>E-mail corporativo</label><input id="email" type="email" autocomplete="email" placeholder="voce@empresa.com"/></div>
      <div class="field"><label>WhatsApp</label><input id="whatsapp" inputmode="tel" autocomplete="tel" placeholder="(11) 9 0000-0000"/></div>
      <div class="field"><label>Empresa</label><input id="empresa" autocomplete="organization" placeholder="Nome da empresa"/></div>
      <div class="err" id="cErr"></div>
      <div class="row"><button class="btn-primary" id="next">Começar as 7 perguntas</button></div>
    </div>`;
  document.getElementById("next").onclick = ()=>{
    const nome=val("nome"), email=val("email"), whatsapp=val("whatsapp"), empresa=val("empresa");
    const err=document.getElementById("cErr");
    if(!nome){return err.textContent="Por favor, informe seu nome.";}
    if(!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)){return err.textContent="Informe um e-mail válido.";}
    if(whatsapp.replace(/\D/g,"").length<10){return err.textContent="Informe um WhatsApp válido com DDD.";}
    if(!empresa){return err.textContent="Por favor, informe a empresa.";}
    state.contact={nome,email,whatsapp,empresa};
    stepIndex=2; screenQuestion(0);
  };
}

function screenQuestion(qi){
  const q = QUESTIONS[qi];
  const history = [];
  stepLabel.textContent = `Pergunta ${qi+1} de ${QUESTIONS.length}`;
  setProgress(2 + qi);
  stage.innerHTML = `
    <div class="screen">
      <div class="num">${String(qi+1).padStart(2,"0")} / 07</div>
      <h2>${q.title}</h2>
      <p class="sub">${q.prompt}</p>
      <div id="aiSlot"></div>
      <div class="field"><div class="ta-wrap">
        <textarea id="ans" placeholder="${q.placeholder}"></textarea>
        <button class="mic" id="mic" title="Gravar áudio" aria-label="Gravar áudio">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/></svg>
        </button>
      </div></div>
      <div class="err" id="qErr"></div>
      <div class="row" id="mainRow">
        <button class="btn-primary" id="send">Responder</button>
        <span class="hint" id="micHint">toque no microfone para falar</span>
      </div>
      <div class="row" id="confirmRow" style="display:none">
        <button class="btn-primary" id="confirm">Confirmar e seguir →</button>
        <button class="btn-ghost" id="recheck">Não, corrigir</button>
      </div>
    </div>`;

  const ans = document.getElementById("ans");
  const sendBtn = document.getElementById("send");
  const qErr = document.getElementById("qErr");
  const aiSlot = document.getElementById("aiSlot");
  const mainRow = document.getElementById("mainRow");
  const confirmRow = document.getElementById("confirmRow");
  let firstRaw = null;

  function bubble(t){ return `<div class="ai"><span class="dot"></span><p>${escapeHtml(t)}</p></div>`; }

  async function send(){
    const text = ans.value.trim();
    if(!text){ qErr.textContent="Escreva ou grave sua resposta."; return; }
    qErr.textContent="";
    if(firstRaw===null) firstRaw = text;
    setBusy(sendBtn, true, "Pensando");
    history.push({role:"user", content:text});
    let res;
    try{
      res = await api({ action:"respond", questionId:q.id, userText:text, history });
    }catch(e){ setBusy(sendBtn,false,"Responder"); qErr.textContent="Falha de conexão. Tente novamente."; return; }
    const captured = res.captured===true || res.fallback===true;
    setBusy(sendBtn,false,"Responder");
    if(captured){
      const value = res.value||"";
      state.answers["q"+q.id] = { raw:firstRaw, value };
      aiSlot.innerHTML = bubble(res.reply||"Entendi sua resposta.") +
        `<div class="confirm-val">Vou registrar como: <strong>${escapeHtml(value||"—")}</strong>. Está correto?</div>`;
      mainRow.style.display="none"; confirmRow.style.display="flex";
    } else {
      history.push({role:"assistant", content:res.reply||"Pode detalhar um pouco mais?"});
      aiSlot.innerHTML = bubble(res.reply||"Pode detalhar um pouco mais?");
      ans.value=""; ans.focus();
    }
  }
  sendBtn.onclick = send;
  document.getElementById("confirm").onclick = ()=> advance(qi);
  document.getElementById("recheck").onclick = ()=>{
    history.length=0; firstRaw=null; qErr.textContent="";
    aiSlot.innerHTML=""; confirmRow.style.display="none"; mainRow.style.display="flex"; ans.focus();
  };
  ans.addEventListener("keydown",e=>{ if((e.metaKey||e.ctrlKey)&&e.key==="Enter") send(); });

  setupMic(document.getElementById("mic"), document.getElementById("micHint"), ans, qErr);
}

function advance(qi){
  if(qi+1 < QUESTIONS.length){ stepIndex++; screenQuestion(qi+1); }
  else { submitAll(); }
}

async function submitAll(){
  stepLabel.textContent=""; setProgress(TOTAL);
  stage.innerHTML = `<div class="screen" style="text-align:center"><div class="kicker">Quase lá</div><h2>Consolidando o seu raio-X…</h2><p class="sub" style="margin-left:auto;margin-right:auto"><span class="spinner" style="border-color:rgba(94,90,190,.3);border-top-color:#5C5ABE"></span> Organizando suas respostas.</p></div>`;
  try{
    await api({ action:"submit", ...state.contact, answers:state.answers, utm:state.utm });
  }catch(e){ }
  screenDone();
}

function screenDone(){
  const a=state.answers;
  const recap = [
    ["Área do desafio", v(a.q1)],
    ["Mais afeta", v(a.q2)],
    ["Abordagem", v(a.q3)],
    ["Impacto anual", v(a.q4)],
    ["Setor", v(a.q5)],
    ["Faturamento", v(a.q6)],
    ["Cargo", v(a.q7)]
  ].filter(r=>r[1]);
  stage.innerHTML = `
    <div class="screen" style="text-align:center">
      <div class="done-badge" style="margin-left:auto;margin-right:auto">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <h2>Pronto, ${escapeHtml((state.contact.nome||"").split(" ")[0])}. Recebemos suas respostas.</h2>
      <p class="sub" style="margin-left:auto;margin-right:auto">Você vai receber o <b>Relatório Executivo</b> e o <b>benchmark do seu setor</b>. Se for selecionado, convidamos para a <b>Sessão Executiva de Interpretação</b>.</p>
      <ul class="recap" style="max-width:520px;margin-left:auto;margin-right:auto;text-align:left">
        ${recap.map(r=>`<li><span>${r[0]}</span><span>${escapeHtml(r[1])}</span></li>`).join("")}
      </ul>
    </div>`;
}

function setupMic(micBtn, hint, ans, qErr){
  let rec=null, chunks=[], stream=null;
  micBtn.onclick = async ()=>{
    if(rec && rec.state==="recording"){ rec.stop(); return; }
    if(!navigator.mediaDevices || !window.MediaRecorder){ qErr.textContent="Seu navegador não suporta gravação; pode escrever a resposta."; return; }
    try{ stream = await navigator.mediaDevices.getUserMedia({audio:true}); }
    catch(e){ qErr.textContent="Não consegui acessar o microfone. Escreva a resposta, sem problema."; return; }
    chunks=[]; rec=new MediaRecorder(stream);
    rec.ondataavailable=e=>{ if(e.data.size>0) chunks.push(e.data); };
    rec.onstart=()=>{ micBtn.classList.add("rec"); hint.textContent="Gravando… toque de novo para parar"; };
    rec.onstop=async ()=>{
      micBtn.classList.remove("rec"); hint.textContent="Transcrevendo…";
      stream.getTracks().forEach(t=>t.stop());
      const blob=new Blob(chunks,{type:"audio/webm"});
      const fd=new FormData(); fd.append("action","transcribe"); fd.append("data",blob,"audio.webm");
      try{
        const r=await fetch(WEBHOOK,{method:"POST",body:fd});
        const j=await r.json();
        const t=(j.text||j.transcription||"").trim();
        if(t){ ans.value = ans.value ? (ans.value+" "+t) : t; ans.focus(); hint.textContent="Pronto — revise e toque em Responder"; }
        else { hint.textContent="Não entendi o áudio; tente de novo ou escreva"; }
      }catch(e){ qErr.textContent="Falha ao transcrever. Você pode escrever a resposta."; hint.textContent="toque no microfone para falar"; }
    };
    rec.start();
  };
}

async function api(payload){
  const r = await fetch(WEBHOOK,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)});
  if(!r.ok) throw new Error("HTTP "+r.status);
  return await r.json();
}
function val(id){ return (document.getElementById(id).value||"").trim(); }
function v(o){ return o && o.value ? o.value : ""; }
function setBusy(btn,busy,label){ btn.disabled=busy; btn.innerHTML = busy ? `<span class="spinner"></span>${label}…` : label; }
function escapeHtml(s){ return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

screenIntro();
</script>
</body>
</html>
